default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: eldev_development

test:
  <<: *default
  database: eldev_test

# Store production database in the storage/ directory, which by default
# is mounted as a persistent Docker volume in config/deploy.yml.
production:
  primary:
    <<: *default
    database: eldev_production
  cache:
    <<: *default
    database: eldev_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: eldev_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: eldev_production_cable
    migrations_paths: db/cable_migrate
